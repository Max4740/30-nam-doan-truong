<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Điểm danh - Ban Tổ chức</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #001f3f 0%, #003366 50%, #005BAA 100%);
      color: #fff;
    }
    /* === LOGIN === */
    #login-section {
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .login-card {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border-radius: 16px; padding: 40px; text-align: center;
      border: 1px solid rgba(255,255,255,0.2); width: 360px;
    }
    .login-logo { font-size: 64px; font-weight: 900; color: #FFD700; text-shadow: 0 0 20px rgba(255,215,0,0.5); margin-bottom: 8px; }
    .login-card h2 { margin-bottom: 24px; font-weight: 400; font-size: 18px; opacity: 0.9; }
    .login-card input {
      width: 100%; padding: 12px 16px; margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
      background: rgba(255,255,255,0.1); color: #fff; font-size: 15px; outline: none;
    }
    .login-card input::placeholder { color: rgba(255,255,255,0.5); }
    .login-card input:focus { border-color: #FFD700; }
    .login-card button {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: #FFD700; color: #001f3f; font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .login-card button:hover { background: #FFC107; }
    .error-text { color: #ff6b6b; margin-top: 8px; font-size: 14px; min-height: 20px; }

    /* === MAIN === */
    #main-section { display: none; }
    .header {
      background: rgba(0,0,0,0.3); padding: 12px 24px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px solid #FFD700;
    }
    .header h1 { font-size: 20px; }
    .header h1 span { color: #FFD700; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .conn-status {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ff4444; display: inline-block; margin-right: 4px;
    }
    .conn-status.online { background: #00c853; }
    .btn {
      padding: 8px 16px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s;
    }
    .btn-gold { background: #FFD700; color: #001f3f; }
    .btn-gold:hover { background: #FFC107; }
    .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.4); color: #fff; }
    .btn-outline:hover { background: rgba(255,255,255,0.1); }
    .btn-danger { background: #e53935; color: #fff; }
    .btn-danger:hover { background: #c62828; }
    .btn-green { background: #00c853; color: #fff; }
    .btn-green:hover { background: #00a844; }

    .container { max-width: 960px; margin: 0 auto; padding: 20px; }

    /* === COUNTER === */
    .counter-box {
      background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
      border: 2px solid #FFD700; border-radius: 12px;
      padding: 20px; text-align: center; margin-bottom: 20px;
    }
    .counter-number { font-size: 56px; font-weight: 900; color: #FFD700; line-height: 1; }
    .counter-label { font-size: 16px; opacity: 0.8; margin-top: 4px; }

    /* === SCAN SECTION === */
    .section { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .section h3 { font-size: 15px; margin-bottom: 12px; color: #FFD700; }
    .scan-input-wrap { position: relative; }
    .scan-input {
      width: 100%; padding: 14px 16px; font-size: 20px; font-weight: 700;
      border: 2px solid #FFD700; border-radius: 8px;
      background: rgba(0,0,0,0.3); color: #FFD700; outline: none;
      letter-spacing: 2px; text-align: center;
    }
    .scan-input::placeholder { color: rgba(255,215,0,0.4); font-weight: 400; letter-spacing: 0; font-size: 16px; }
    .scan-input:focus { box-shadow: 0 0 20px rgba(255,215,0,0.3); }

    /* === MANUAL ENTRY === */
    .manual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .manual-grid .full { grid-column: 1 / -1; }
    .manual-input {
      width: 100%; padding: 10px 12px; border: 1px solid rgba(255,255,255,0.3);
      border-radius: 6px; background: rgba(255,255,255,0.1); color: #fff;
      font-size: 14px; outline: none;
    }
    .manual-input::placeholder { color: rgba(255,255,255,0.4); }
    .manual-input:focus { border-color: #FFD700; }

    /* === FEEDBACK === */
    .feedback {
      padding: 12px 16px; border-radius: 8px; margin-bottom: 16px;
      font-size: 14px; display: none; animation: fadeIn 0.3s;
    }
    .feedback.success { display: block; background: rgba(0,200,83,0.2); border: 1px solid #00c853; }
    .feedback.error { display: block; background: rgba(229,57,53,0.2); border: 1px solid #e53935; }
    .feedback.warning { display: block; background: rgba(255,193,7,0.2); border: 1px solid #FFC107; color: #FFD700; }

    /* === RECENT LIST === */
    .recent-list { max-height: 300px; overflow-y: auto; }
    .recent-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
      animation: slideIn 0.3s;
    }
    .recent-item:last-child { border-bottom: none; }
    .recent-order {
      background: #FFD700; color: #001f3f; width: 32px; height: 32px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; flex-shrink: 0;
    }
    .recent-info { flex: 1; margin-left: 12px; }
    .recent-name { font-weight: 600; font-size: 14px; }
    .recent-detail { font-size: 12px; opacity: 0.6; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
  <div id="login-section"></div>
  <div id="main-section">
    <div class="header">
      <h1><span>DIEM DANH</span> - Ban To chuc</h1>
      <div class="header-actions">
        <span class="conn-status" id="conn-dot"></span>
        <button class="btn btn-gold" onclick="openDisplay()">Mo man hinh chao mung</button>
        <button class="btn btn-outline" onclick="doLogout()">Dang xuat</button>
      </div>
    </div>
    <div class="container">
      <!-- Counter -->
      <div class="counter-box">
        <div class="counter-number" id="counter">0</div>
        <div class="counter-label">nguoi da diem danh</div>
      </div>

      <!-- Feedback -->
      <div class="feedback" id="feedback"></div>

      <!-- Scan barcode -->
      <div class="section">
        <h3>QUET MA VACH (Tu dong)</h3>
        <div class="scan-input-wrap">
          <input type="text" class="scan-input" id="scan-input" placeholder="Click vao day roi quet ma vach..." autofocus autocomplete="off">
        </div>
      </div>

      <!-- Manual entry -->
      <div class="section">
        <h3>NHAP THU CONG</h3>
        <div class="manual-grid">
          <input class="manual-input full" id="m-name" placeholder="Ho va ten *" required>
          <input class="manual-input" id="m-mssv" placeholder="MSSV (khong bat buoc)">
          <input class="manual-input" id="m-faculty" placeholder="Khoa (khong bat buoc)">
          <input class="manual-input" id="m-major" placeholder="Nganh (khong bat buoc)">
        </div>
        <button class="btn btn-green" style="margin-top:12px;width:100%" onclick="manualCheckIn()">Diem danh thu cong</button>
      </div>

      <!-- Actions -->
      <div style="display:flex; gap:10px; margin-bottom:16px;">
        <button class="btn btn-gold" style="flex:1" onclick="exportExcel()">Xuat danh sach Excel</button>
        <button class="btn btn-danger" onclick="resetAll()">Reset tat ca</button>
      </div>

      <!-- Recent -->
      <div class="section">
        <h3>LICH SU DIEM DANH GAN DAY</h3>
        <div class="recent-list" id="recent-list">
          <p style="opacity:0.5;text-align:center;padding:20px;">Chua co ai diem danh</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    injectLoginForm('Dang nhap - Diem danh BTC');
    initAuth(onReady);

    let recentItems = [];

    function onReady() {
      // Keep scan input focused
      const scanInput = document.getElementById('scan-input');
      scanInput.focus();
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.manual-grid') && !e.target.closest('button') && !e.target.closest('.login-card')) {
          scanInput.focus();
        }
      });

      // Listen barcode scan (Enter key)
      scanInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const mssv = scanInput.value.trim();
          scanInput.value = '';
          if (mssv) scanCheckIn(mssv);
        }
      });

      // Listen counter
      db.ref('check_in_counter').on('value', snap => {
        document.getElementById('counter').textContent = snap.val() || 0;
      });

      // Listen recent check-ins
      db.ref('check_in_log').orderByChild('timestamp').limitToLast(30).on('value', snap => {
        const list = document.getElementById('recent-list');
        recentItems = [];
        snap.forEach(child => {
          recentItems.unshift({ key: child.key, ...child.val() });
        });
        if (recentItems.length === 0) {
          list.innerHTML = '<p style="opacity:0.5;text-align:center;padding:20px;">Chua co ai diem danh</p>';
          return;
        }
        list.innerHTML = recentItems.map(item => `
          <div class="recent-item">
            <div class="recent-order">${item.order}</div>
            <div class="recent-info">
              <div class="recent-name">${item.name}${item.mssv ? ' - ' + item.mssv : ''}</div>
              <div class="recent-detail">${item.faculty || ''} ${item.major ? '| ' + item.major : ''}</div>
            </div>
          </div>
        `).join('');
      });

      // Connection status
      db.ref('.info/connected').on('value', snap => {
        const dot = document.getElementById('conn-dot');
        dot.classList.toggle('online', snap.val() === true);
      });
    }

    function showFeedback(msg, type) {
      const fb = document.getElementById('feedback');
      fb.textContent = msg;
      fb.className = 'feedback ' + type;
      if (type !== 'error') {
        setTimeout(() => { fb.className = 'feedback'; }, 4000);
      }
    }

    async function scanCheckIn(mssv) {
      try {
        const snap = await db.ref('students_data/' + mssv).once('value');
        if (!snap.exists()) {
          showFeedback('Khong tim thay MSSV: ' + mssv + '. Hay nhap thu cong neu can.', 'error');
          return;
        }
        const student = snap.val();
        if (student.checked_in) {
          showFeedback(student.name + ' (' + mssv + ') - DA DIEM DANH ROI! (thu ' + student.check_in_order + ')', 'warning');
          return;
        }
        // Get new order number
        const counterSnap = await db.ref('check_in_counter').transaction(cur => (cur || 0) + 1);
        const order = counterSnap.snapshot.val();
        const now = Date.now();

        // Update student record
        await db.ref('students_data/' + mssv).update({
          checked_in: true,
          check_in_order: order,
          timestamp: now
        });

        // Push to log
        const logEntry = {
          name: student.name,
          mssv: mssv,
          faculty: student.faculty || '',
          major: student.major || '',
          order: order,
          timestamp: now
        };
        await db.ref('check_in_log').push(logEntry);

        // Update last check-in (for display screen)
        await db.ref('last_check_in').set(logEntry);

        showFeedback('OK! ' + student.name + ' - ' + mssv + ' | Nguoi thu ' + order, 'success');
      } catch (err) {
        showFeedback('Loi: ' + err.message, 'error');
      }
    }

    async function manualCheckIn() {
      const name = document.getElementById('m-name').value.trim();
      const mssv = document.getElementById('m-mssv').value.trim();
      const faculty = document.getElementById('m-faculty').value.trim();
      const major = document.getElementById('m-major').value.trim();

      if (!name) {
        showFeedback('Vui long nhap Ho va ten!', 'error');
        return;
      }

      try {
        // If MSSV provided, check if already in database
        if (mssv) {
          const snap = await db.ref('students_data/' + mssv).once('value');
          if (snap.exists() && snap.val().checked_in) {
            showFeedback(name + ' (' + mssv + ') - DA DIEM DANH ROI!', 'warning');
            return;
          }
        }

        const counterSnap = await db.ref('check_in_counter').transaction(cur => (cur || 0) + 1);
        const order = counterSnap.snapshot.val();
        const now = Date.now();

        const logEntry = {
          name: name,
          mssv: mssv || '',
          faculty: faculty || '',
          major: major || '',
          order: order,
          timestamp: now,
          manual: true
        };

        // If MSSV exists in DB, update it
        if (mssv) {
          await db.ref('students_data/' + mssv).update({
            checked_in: true,
            check_in_order: order,
            timestamp: now
          });
        }

        await db.ref('check_in_log').push(logEntry);
        await db.ref('last_check_in').set(logEntry);

        showFeedback('OK! ' + name + (mssv ? ' - ' + mssv : '') + ' | Nguoi thu ' + order, 'success');

        // Clear form
        document.getElementById('m-name').value = '';
        document.getElementById('m-mssv').value = '';
        document.getElementById('m-faculty').value = '';
        document.getElementById('m-major').value = '';
      } catch (err) {
        showFeedback('Loi: ' + err.message, 'error');
      }
    }

    function openDisplay() {
      window.open('display.html', 'display', 'width=1920,height=1080');
    }

    async function exportExcel() {
      try {
        const snap = await db.ref('check_in_log').orderByChild('order').once('value');
        const data = [];
        snap.forEach(child => {
          const v = child.val();
          data.push({
            'STT': v.order,
            'Ho va ten': v.name,
            'MSSV': v.mssv || '',
            'Khoa': v.faculty || '',
            'Nganh': v.major || '',
            'Thu cong': v.manual ? 'Co' : '',
            'Thoi gian': new Date(v.timestamp).toLocaleString('vi-VN')
          });
        });
        data.sort((a, b) => a['STT'] - b['STT']);
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Diem danh');
        XLSX.writeFile(wb, 'diem_danh_30nam_' + new Date().toISOString().slice(0,10) + '.xlsx');
        showFeedback('Da xuat file Excel!', 'success');
      } catch (err) {
        showFeedback('Loi xuat file: ' + err.message, 'error');
      }
    }

    async function resetAll() {
      if (!confirm('BAN CO CHAC MUON RESET TAT CA DU LIEU DIEM DANH?\n\nHanh dong nay KHONG THE HOAN TAC!')) return;
      if (!confirm('XAC NHAN LAN 2: Reset tat ca?')) return;
      try {
        // Reset counter
        await db.ref('check_in_counter').set(0);
        // Remove log
        await db.ref('check_in_log').remove();
        // Remove last check-in
        await db.ref('last_check_in').remove();
        // Reset all students' checked_in status
        const snap = await db.ref('students_data').once('value');
        const updates = {};
        snap.forEach(child => {
          updates[child.key + '/checked_in'] = false;
          updates[child.key + '/check_in_order'] = null;
          updates[child.key + '/timestamp'] = null;
        });
        await db.ref('students_data').update(updates);
        showFeedback('Da reset tat ca du lieu diem danh!', 'success');
      } catch (err) {
        showFeedback('Loi reset: ' + err.message, 'error');
      }
    }
  </script>
</body>
</html>
